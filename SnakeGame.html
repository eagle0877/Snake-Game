<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Snake - 10s Clearance</title>
    <style>
        body {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; background-color: #121212; color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif; touch-action: none; overflow: hidden;
        }
        #hud { display: flex; justify-content: space-between; width: 90vw; max-width: 400px; margin-bottom: 5px; }
        #current-score { font-size: 1.8rem; font-weight: bold; color: #4caf50; }
        #live-rank { font-size: 0.9rem; color: #888; align-self: flex-end; }
        #timer-container { width: 90vw; max-width: 400px; height: 8px; background: #333; margin-bottom: 5px; border-radius: 4px; display: none; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background: #ff5252; transition: width 0.1s linear; }
        canvas { border: 2px solid #333; background-color: #000; width: 90vw; height: 90vw; max-width: 400px; max-height: 400px; }
        #leaderboard { width: 90vw; max-width: 400px; background: #1e1e1e; margin-top: 15px; padding: 10px; border-radius: 8px; height: 120px; display: flex; flex-direction: column; }
        #score-list { flex-grow: 1; overflow-y: scroll; font-size: 0.8rem; }
        .score-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2a2a2a; }
        #overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #4caf50; border-radius: 10px; display: none; text-align: center; z-index: 100; }
    </style>
</head>
<body>
    <div id="hud">
        <div id="current-score">0</div>
        <div id="live-rank">Rank: --</div>
    </div>
    <div id="timer-container"><div id="timer-bar"></div></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="leaderboard"><div id="score-list"></div></div>
    <div id="overlay">
        <h2 id="overlay-text" style="color:#4caf50; margin:0;">GAME OVER</h2>
        <p id="overlay-sub" style="margin:5px 0 0 0;">Ranked #1</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("current-score");
        const rankDisplay = document.getElementById("live-rank");
        const scoreList = document.getElementById("score-list");
        const timerContainer = document.getElementById("timer-container");
        const timerBar = document.getElementById("timer-bar");
        const overlay = document.getElementById("overlay");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0, dx = 0, dy = 0, nextDx = 0, nextDy = 0;
        let changingDirection = false;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5}, hazards = [];
        let isClearanceMode = false, clearanceTimeLeft = 0, clearanceInterval = null;

        // --- SWIPE LOGIC ---
        let tStartX = 0, tStartY = 0;
        canvas.addEventListener('touchstart', e => { tStartX = e.changedTouches[0].screenX; tStartY = e.changedTouches[0].screenY; }, false);
        canvas.addEventListener('touchend', e => {
            if (changingDirection) return;
            const dX = e.changedTouches[0].screenX - tStartX, dY = e.changedTouches[0].screenY - tStartY;
            if (Math.abs(dX) > Math.abs(dY)) {
                if (Math.abs(dX) > 30) { if (dX > 0 && dx !== -1) { nextDx = 1; nextDy = 0; } else if (dX < 0 && dx !== 1) { nextDx = -1; nextDy = 0; } changingDirection = true; }
            } else {
                if (Math.abs(dY) > 30) { if (dY > 0 && dy !== -1) { nextDx = 0; nextDy = 1; } else if (dY < 0 && dy !== 1) { nextDx = 0; nextDy = -1; } changingDirection = true; }
            }
        }, false);

        function main() {
            if (didGameEnd()) { handleGameOver(); return; }
            setTimeout(() => {
                changingDirection = false; dx = nextDx; dy = nextDy;
                clearCanvas(); drawHazards(); drawFood(); advanceSnake(); drawSnake(); updateLiveRank();
                main();
            }, 100);
        }

        function startClearanceMode() {
            isClearanceMode = true; clearanceTimeLeft = 10; // Updated to 10 seconds
            timerContainer.style.display = "block";
            clearInterval(clearanceInterval);
            clearanceInterval = setInterval(() => {
                clearanceTimeLeft -= 0.1;
                timerBar.style.width = (clearanceTimeLeft / 10 * 100) + "%";
                if (clearanceTimeLeft <= 0) endClearanceMode();
            }, 100);
        }

        function endClearanceMode() { isClearanceMode = false; clearInterval(clearanceInterval); timerContainer.style.display = "none"; }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            const hIndex = hazards.findIndex(h => h.x === head.x && h.y === head.y);
            
            if (isClearanceMode && hIndex !== -1) {
                hazards.splice(hIndex, 1);
                score += 20; scoreDisplay.innerHTML = score;
                snake.unshift(head); // Treat hazard like food (snake grows)
            } else if (head.x === food.x && head.y === food.y) {
                score += 10; scoreDisplay.innerHTML = score;
                snake.unshift(head);
                if (score > 0 && score % 500 === 0) startClearanceMode();
                if (score % 100 === 0) addHazard();
                createFood();
            } else {
                snake.unshift(head);
                snake.pop();
            }
        }

        function createFood() {
            let valid = false;
            while (!valid) {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
                // STRICT CHECK: Not on snake and not on hazard
                const onSnake = snake.some(p => p.x === food.x && p.y === food.y);
                const onHazard = hazards.some(h => h.x === food.x && h.y === food.y);
                if (!onSnake && !onHazard) valid = true;
            }
        }

        function addHazard() {
            let hX, hY, valid = false;
            while (!valid) {
                hX = Math.floor(Math.random() * tileCount);
                hY = Math.floor(Math.random() * tileCount);
                const onSnake = snake.some(p => p.x === hX && p.y === hY);
                const onFood = (food.x === hX && food.y === hY);
                const onHazard = hazards.some(h => h.x === hX && h.y === hY);
                if (!onSnake && !onFood && !onHazard) valid = true;
            }
            hazards.push({x: hX, y: hY});
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;
            const h = snake[0];
            const hitWall = h.x < 0 || h.x >= tileCount || h.y < 0 || h.y >= tileCount;
            const hitSelf = snake.slice(1).some(p => p.x === h.x && p.y === h.y);
            const hitHazard = !isClearanceMode && hazards.some(haz => haz.x === h.x && haz.y === h.y);
            return hitWall || hitSelf || hitHazard;
        }

        function clearCanvas() { ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function drawSnake() { ctx.fillStyle = "#4caf50"; snake.forEach(p => ctx.fillRect(p.x * gridSize, p.y * gridSize, gridSize - 2, gridSize - 2)); }
        function drawFood() { ctx.fillStyle = "#ff5252"; ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2); }
        function drawHazards() { ctx.fillStyle = isClearanceMode ? "#ff5252" : "#9c27b0"; hazards.forEach(h => ctx.fillRect(h.x * gridSize, h.y * gridSize, gridSize - 2, gridSize - 2)); }
        
        function handleGameOver() {
            const rank = saveScore(score);
            overlay.style.display = "block";
            overlaySub.innerText = rank !== -1 ? `Ranked #${rank+1}` : "Game Over";
            setTimeout(() => { overlay.style.display = "none"; resetGame(); main(); }, 1500);
        }

        function resetGame() {
            score = 0; scoreDisplay.innerHTML = "0"; snake = [{x: 10, y: 10}];
            hazards = []; dx = 0; dy = 0; nextDx = 0; nextDy = 0; endClearanceMode();
        }

        function saveScore(s) {
            if (s === 0) return -1;
            let scores = JSON.parse(localStorage.getItem('snakeScores')) || [];
            const entry = { score: s, date: new Date().toLocaleDateString(), id: Date.now() };
            scores.push(entry); scores.sort((a,b) => b.score - a.score);
            scores = scores.slice(0, 100);
            localStorage.setItem('snakeScores', JSON.stringify(scores));
            displayScores();
            return scores.findIndex(x => x.id === entry.id);
        }

        function displayScores() {
            const scores = JSON.parse(localStorage.getItem('snakeScores')) || [];
            scoreList.innerHTML = scores.map((s,i) => `<div class="score-row"><span>${i+1}. ${s.score}</span><span>${s.date}</span></div>`).join('');
        }

        function updateLiveRank() {
            if (score === 0) return;
            let scores = JSON.parse(localStorage.getItem('snakeScores')) || [];
            rankDisplay.innerText = `Rank: #${scores.filter(s => s.score > score).length + 1}`;
        }

        window.addEventListener("keydown", e => {
            if (changingDirection) return;
            if (e.keyCode === 37 && dx !== 1) { nextDx = -1; nextDy = 0; }
            if (e.keyCode === 38 && dy !== 1) { nextDx = 0; nextDy = -1; }
            if (e.keyCode === 39 && dx !== -1) { nextDx = 1; nextDy = 0; }
            if (e.keyCode === 40 && dy !== -1) { nextDx = 0; nextDy = 1; }
            changingDirection = true;
        });

        displayScores();
        main();
    </script>
</body>
</html>
