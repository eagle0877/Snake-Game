<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zen Snake Mobile</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            touch-action: none; /* Prevents browser pull-to-refresh and zoom */
            overflow: hidden;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            width: 90vw;
            max-width: 400px;
            margin-bottom: 5px;
        }
        #current-score { font-size: 1.8rem; font-weight: bold; color: #4caf50; }
        #live-rank { font-size: 0.9rem; color: #888; align-self: flex-end; }
        
        #timer-container {
            width: 90vw;
            max-width: 400px;
            height: 6px;
            background: #333;
            margin-bottom: 5px;
            border-radius: 3px;
            display: none;
            overflow: hidden;
        }
        #timer-bar { height: 100%; width: 100%; background: #ff5252; transition: width 1s linear; }

        canvas {
            border: 2px solid #333;
            background-color: #000;
            width: 90vw;
            height: 90vw;
            max-width: 400px;
            max-height: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #leaderboard {
            width: 90vw;
            max-width: 400px;
            background: #1e1e1e;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            height: 150px;
            display: flex;
            flex-direction: column;
        }
        #score-list { flex-grow: 1; overflow-y: scroll; font-size: 0.8rem; }
        .score-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2a2a2a; }

        #overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border: 2px solid #4caf50;
            border-radius: 10px;
            display: none;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="current-score">0</div>
        <div id="live-rank">Rank: --</div>
    </div>
    <div id="timer-container"><div id="timer-bar"></div></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="leaderboard">
        <div id="score-list"></div>
    </div>

    <div id="overlay">
        <h2 id="overlay-text" style="color:#4caf50; margin:0;">GAME OVER</h2>
        <p id="overlay-sub" style="margin:5px 0 0 0;">Ranked #1</p>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDisplay = document.getElementById("current-score");
        const rankDisplay = document.getElementById("live-rank");
        const scoreList = document.getElementById("score-list");
        const timerContainer = document.getElementById("timer-container");
        const timerBar = document.getElementById("timer-bar");
        const overlay = document.getElementById("overlay");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0, dx = 0, dy = 0, nextDx = 0, nextDy = 0;
        let changingDirection = false;
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5}, hazards = [];
        let isClearanceMode = false, clearanceTimeLeft = 0, clearanceInterval = null;

        // --- MOBILE SWIPE LOGIC ---
        let touchStartX = 0;
        let touchStartY = 0;

        canvas.addEventListener('touchstart', function(e) {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, false);

        canvas.addEventListener('touchend', function(e) {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
        }, false);

        function handleSwipe(startX, startY, endX, endY) {
            if (changingDirection) return;
            
            const diffX = endX - startX;
            const diffY = endY - startY;
            const threshold = 30; // Min distance to be considered a swipe

            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Horizontal Swipe
                if (Math.abs(diffX) > threshold) {
                    if (diffX > 0 && dx !== -1) { nextDx = 1; nextDy = 0; }
                    else if (diffX < 0 && dx !== 1) { nextDx = -1; nextDy = 0; }
                    changingDirection = true;
                }
            } else {
                // Vertical Swipe
                if (Math.abs(diffY) > threshold) {
                    if (diffY > 0 && dy !== -1) { nextDx = 0; nextDy = 1; }
                    else if (diffY < 0 && dy !== 1) { nextDx = 0; nextDy = -1; }
                    changingDirection = true;
                }
            }
        }

        // --- CORE GAME ENGINE ---
        function main() {
            if (didGameEnd()) {
                handleGameOver();
                return;
            }
            setTimeout(function onTick() {
                changingDirection = false;
                dx = nextDx; dy = nextDy;
                clearCanvas();
                drawHazards();
                drawFood();
                advanceSnake();
                drawSnake();
                updateLiveRank();
                main();
            }, 110); // Slightly slower for mobile responsiveness
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head);
            const hazardIndex = hazards.findIndex(h => h.x === snake[0].x && h.y === snake[0].y);
            
            if (isClearanceMode && hazardIndex !== -1) {
                hazards.splice(hazardIndex, 1);
                score += 20; scoreDisplay.innerHTML = score;
            } else if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10; scoreDisplay.innerHTML = score;
                if (score > 0 && score % 500 === 0) startClearanceMode();
                if (score % 100 === 0) addHazard();
                createFood();
            } else {
                snake.pop();
            }
        }

        function startClearanceMode() {
            isClearanceMode = true; clearanceTimeLeft = 15;
            timerContainer.style.display = "block";
            clearanceInterval = setInterval(() => {
                clearanceTimeLeft--;
                timerBar.style.width = (clearanceTimeLeft / 15 * 100) + "%";
                if (clearanceTimeLeft <= 0) endClearanceMode();
            }, 1000);
        }

        function endClearanceMode() {
            isClearanceMode = false; clearInterval(clearanceInterval);
            timerContainer.style.display = "none";
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;
            const hitWall = snake[0].x < 0 || snake[0].x > tileCount - 1 || snake[0].y < 0 || snake[0].y > tileCount - 1;
            const hitSelf = snake.slice(1).some(part => part.x === snake[0].x && part.y === snake[0].y);
            const hitHazard = !isClearanceMode && hazards.some(h => h.x === snake[0].x && h.y === snake[0].y);
            return hitWall || hitSelf || hitHazard;
        }

        // Standard helpers
        function clearCanvas() { ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height); }
        function drawSnake() { ctx.fillStyle = "#4caf50"; snake.forEach(p => ctx.fillRect(p.x * gridSize, p.y * gridSize, gridSize - 2, gridSize - 2)); }
        function drawFood() { ctx.fillStyle = "#ff5252"; ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2); }
        function drawHazards() { ctx.fillStyle = isClearanceMode ? "#ff5252" : "#9c27b0"; hazards.forEach(h => ctx.fillRect(h.x * gridSize, h.y * gridSize, gridSize - 2, gridSize - 2)); }
        
        function handleGameOver() {
            const rank = saveScore(score);
            overlay.style.display = "block";
            overlaySub.innerText = rank !== -1 ? `Ranked #${rank+1}` : "Try again!";
            setTimeout(() => { overlay.style.display = "none"; resetGame(); main(); }, 2000);
        }

        function resetGame() {
            score = 0; scoreDisplay.innerHTML = "0"; snake = [{x: 10, y: 10}];
            hazards = []; dx = 0; dy = 0; nextDx = 0; nextDy = 0; endClearanceMode();
        }

        function saveScore(s) {
            if (s === 0) return -1;
            let scores = JSON.parse(localStorage.getItem('snakeScores')) || [];
            const entry = { score: s, date: new Date().toLocaleDateString(), id: Date.now() };
            scores.push(entry); scores.sort((a,b) => b.score - a.score);
            scores = scores.slice(0, 100);
            localStorage.setItem('snakeScores', JSON.stringify(scores));
            displayScores();
            return scores.findIndex(x => x.id === entry.id);
        }

        function displayScores() {
            const scores = JSON.parse(localStorage.getItem('snakeScores')) || [];
            scoreList.innerHTML = scores.map((s,i) => `<div class="score-row"><span>${i+1}. ${s.score}</span><span>${s.date}</span></div>`).join('');
        }

        function updateLiveRank() {
            if (score === 0) return;
            let scores = JSON.parse(localStorage.getItem('snakeScores')) || [];
            rankDisplay.innerText = `Rank: #${scores.filter(s => s.score > score).length + 1}`;
        }

        function addHazard() {
            let hX = Math.floor(Math.random()*tileCount), hY = Math.floor(Math.random()*tileCount);
            if (!snake.some(p=>p.x===hX&&p.y===hY) && !(food.x===hX&&food.y===hY)) hazards.push({x:hX, y:hY});
        }

        function createFood() {
            food.x = Math.floor(Math.random()*tileCount); food.y = Math.floor(Math.random()*tileCount);
        }

        window.addEventListener("keydown", e => {
            if (changingDirection) return;
            if (e.keyCode === 37 && dx !== 1) { nextDx = -1; nextDy = 0; }
            if (e.keyCode === 38 && dy !== 1) { nextDx = 0; nextDy = -1; }
            if (e.keyCode === 39 && dx !== -1) { nextDx = 1; nextDy = 0; }
            if (e.keyCode === 40 && dy !== -1) { nextDx = 0; nextDy = 1; }
            changingDirection = true;
        });

        displayScores();
        main();
    </script>
</body>
</html>
